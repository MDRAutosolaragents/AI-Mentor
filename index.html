<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mentor</title>
    <style>
        body {
            margin: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        header {
            background: #1e1e1e;
            padding: 10px;
            text-align: center;
        }
        main {
            padding: 20px;
        }
        footer {
            background: #1e1e1e;
            padding: 10px;
            text-align: center;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }
        button {
            background-color: #6200ea;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #3700b3;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #2e2e2e;
            color: #ffffff;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to AI Mentor</h1>
    </header>
    <main class="container">
        <h2>Your AI Assistant</h2>
        <p>This page showcases a dark-themed, responsive design for the AI Mentor application.</p>
        <input type="text" placeholder="Enter your query..." />
        <button>Submit</button>
        <textarea rows="4" placeholder="Your response..."></textarea>
    </main>
    <footer>
        <p>&copy; 2026 AI Mentor. All rights reserved.</p>
    </footer>
</body>
</html>
